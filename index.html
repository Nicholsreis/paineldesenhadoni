<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de senha do Ni — Sistema de Gerenciamento de Senhas</title>

  <style>
    /* =========================================================
       CSS Variables — Light Theme
       ========================================================= */
    :root {
      --bg-primary:    #f8fafc;
      --bg-secondary:  #ffffff;
      --bg-card:       #ffffff;
      --bg-elevated:   #f1f5f9;
      --text-primary:  #0f172a;
      --text-secondary:#475569;
      --text-muted:    #94a3b8;
      --border:        #e2e8f0;
      --accent:        #2563eb;
      --accent-hover:  #1d4ed8;
      --success:       #059669;
      --warning:       #d97706;
      --danger:        #dc2626;
      --radius:        8px;
      --radius-lg:     12px;
    }

    /* =========================================================
       CSS Reset
       ========================================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* =========================================================
       Base Styles
       ========================================================= */
    html {
      min-width: 1280px;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
    }

    /* =========================================================
       Custom Scrollbar — Dark Theme
       ========================================================= */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-elevated);
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: var(--radius);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* =========================================================
       Utility Classes
       ========================================================= */
    .flex         { display: flex; }
    .flex-col     { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .gap-2        { gap: 0.5rem; }
    .gap-4        { gap: 1rem; }
    .w-full       { width: 100%; }
    .h-full       { height: 100%; }
    .text-center  { text-align: center; }

    /* =========================================================
       Animations
       ========================================================= */
    @keyframes pulse-call {
      0%   { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
      50%  { box-shadow: 0 0 0 16px rgba(59, 130, 246, 0); }
      100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* =========================================================
       NavBar
       ========================================================= */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
      z-index: 1000;
    }

    .navbar-logo {
      font-family: 'Oswald', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-right: 1rem;
      flex-shrink: 0;
    }

    .navbar-nav {
      display: flex;
      gap: 0.25rem;
    }

    .navbar-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.4rem 1rem;
      border-radius: var(--radius);
      color: var(--text-secondary);
      transition: color 0.15s, background 0.15s;
    }

    .navbar-btn:hover {
      color: var(--text-primary);
    }

    .navbar-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* =========================================================
       Module Container
       ========================================================= */
    .module-container {
      padding-top: 60px;
      min-height: 100vh;
    }

    .module-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 60px);
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      color: var(--text-secondary);
    }

    /* =========================================================
       Totem Module
       ========================================================= */
    .totem {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 2rem;
      background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 100%);
      text-align: center;
    }

    .totem-sector {
      font-family: 'Oswald', sans-serif;
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .totem-instruction {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem;
      color: var(--text-secondary);
      margin-bottom: 3rem;
    }

    .totem-buttons {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .service-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      width: 220px;
      height: 220px;
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-family: 'Oswald', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.05em;
      transition: transform 0.15s, filter 0.15s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .service-btn:hover {
      transform: scale(1.04);
      filter: brightness(1.1);
    }

    .service-btn:active {
      transform: scale(0.97);
    }

    .service-btn-icon {
      font-size: 3rem;
      line-height: 1;
    }

    .totem-unavailable {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.4rem;
      color: var(--warning);
      background: rgba(217,119,6,0.1);
      border: 1px solid var(--warning);
      border-radius: var(--radius-lg);
      padding: 2rem 3rem;
    }

    /* Paper-out card (aviso leve — papel acabando) */
    .paper-out-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      animation: fadeIn 0.3s ease;
    }

    .paper-out-card {
      background: #fff;
      border: 3px solid #dc2626;
      border-radius: var(--radius-lg);
      padding: 2.5rem 3rem;
      text-align: center;
      max-width: 420px;
      animation: slideIn 0.3s ease;
    }

    .paper-out-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }

    .paper-out-title {
      font-family: 'Oswald', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #dc2626;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .paper-out-msg {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      color: #475569;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .paper-out-dismiss {
      background: #dc2626;
      color: #fff;
      border: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.6rem 2rem;
      border-radius: var(--radius);
      cursor: pointer;
    }

    .paper-out-dismiss:hover { filter: brightness(1.1); }

    /* =========================================================
       ErrorCard — card fullscreen de erro crítico (totem bloqueado)
       ========================================================= */
    @keyframes error-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }

    .error-card-overlay {
      position: fixed;
      inset: 0;
      background: #dc2626;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 4000;
      animation: fadeIn 0.4s ease;
      text-align: center;
      padding: 2rem;
    }

    .error-card-icon {
      font-size: 8rem;
      line-height: 1;
      margin-bottom: 2rem;
      animation: error-pulse 2s ease-in-out infinite;
    }

    .error-card-title {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      line-height: 1.1;
    }

    .error-card-subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      margin-bottom: 3rem;
      line-height: 1.4;
    }

    .error-card-detail {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.2);
      border-radius: var(--radius);
      padding: 0.5rem 1.5rem;
      margin-bottom: 2rem;
    }

    .error-card-dismiss {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.75rem 2.5rem;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }

    .error-card-dismiss:hover {
      background: rgba(255,255,255,0.25);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: fadeIn 0.2s ease;
    }

    .modal-ticket {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem 3rem;
      min-width: 380px;
      max-width: 480px;
      text-align: center;
      animation: slideIn 0.25s ease;
      position: relative;
    }

    .modal-sector {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .modal-ticket-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 7rem;
      font-weight: 700;
      line-height: 1;
      margin: 0.25rem 0;
    }

    .modal-service-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      padding: 0.3rem 1rem;
      border-radius: 999px;
      display: inline-block;
      color: #fff;
    }

    .modal-info {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
    }

    .modal-welcome {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      color: var(--text-muted);
      margin-top: 1.2rem;
      font-style: italic;
    }

    .modal-close-btn {
      margin-top: 1.5rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.6rem 2rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
    }

    .modal-close-btn:hover {
      background: var(--accent);
    }

    .modal-timer-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      background: var(--accent);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      animation: timer-shrink 6s linear forwards;
    }

    @keyframes timer-shrink {
      from { width: 100%; }
      to   { width: 0%; }
    }

    /* =========================================================
       Painel Module
       ========================================================= */
    .painel {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 60px);
      background: var(--bg-primary);
    }

    .painel-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .painel-header-sector {
      font-family: 'Oswald', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .painel-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .painel-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      min-width: 60%;
      min-height: 0;
      position: relative;
    }

    /* Quando exibe mídia, remove padding para preencher tudo */
    .painel-main.painel-main--media {
      padding: 0;
      align-items: stretch;
      justify-content: stretch;
      overflow: hidden;
    }

    .painel-main.painel-main--media .media-carousel {
      height: 100%;
      width: 100%;
    }

    .painel-sidebar {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      overflow: hidden;
    }

    .current-call-area {
      text-align: center;
      padding: 1.25rem 1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      margin-top: auto;
      transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
      opacity: 1;
      transform: scale(1);
    }

    /* Efeito de transição fade out com 500ms */
    .current-call-area.fade-exit {
      transform: scale(0.9);
      opacity: 0;
    }

    .current-call-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .current-call-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10rem;
      font-weight: 700;
      line-height: 1;
      transition: color 0.3s;
    }

    .current-call-number.flash {
      animation: pulse-call 1.2s ease;
    }

    .current-call-type {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      padding: 0.3rem 1.2rem;
      border-radius: 999px;
      display: inline-block;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .current-call-station {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.2rem;
      color: var(--text-secondary);
    }

    .painel-waiting {
      text-align: center;
      color: var(--text-muted);
    }

    .painel-waiting-text {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      margin-top: 1rem;
    }

    /* Queue counters */
    .queue-counters {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .queue-counter-card {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      text-align: center;
    }

    .queue-counter-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
    }

    .queue-counter-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }
    .recent-calls {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      border-bottom: 1px solid var(--border);
    }

    .recent-calls-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }

    .recent-call-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius);
      margin-bottom: 0.4rem;
      background: var(--bg-elevated);
      font-family: 'Rajdhani', sans-serif;
      transition: all 0.3s ease;
    }

    .recent-call-item.highlight {
      animation: recent-highlight 2s ease;
    }

    @keyframes recent-highlight {
      0%, 100% { 
        background: var(--bg-elevated);
        transform: scale(1);
      }
      15% { 
        background: var(--accent);
        transform: scale(1.05);
      }
      30% {
        background: var(--accent);
        transform: scale(1.05);
      }
    }

    .recent-call-item.highlight .recent-call-ticket,
    .recent-call-item.highlight .recent-call-meta {
      animation: text-flash 2s ease;
    }

    @keyframes text-flash {
      0%, 100% { color: inherit; }
      15%, 30% { color: #fff; }
    }

    .recent-call-ticket {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
    }

    .recent-call-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Media Carousel */
    .media-carousel {
      height: 200px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .media-slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
      background-size: cover;
      background-position: center;
      transition: opacity 0.5s ease;
    }

    .media-slide-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    .media-slide-content {
      position: relative;
      z-index: 1;
    }

    .media-slide-title {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.25rem;
    }

    .media-slide-caption {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.8);
    }

    .media-dots {
      position: absolute;
      bottom: 8px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 6px;
      z-index: 2;
    }

    .media-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transition: background 0.3s;
    }

    .media-dot.active {
      background: #fff;
    }

    /* Mídia indoor na área principal do painel (sem chamada ativa) */
    .painel-media-fullarea {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    .painel-media-fullarea .media-carousel {
      height: 100%;
    }

    .painel-media-fullarea .media-slide-title {
      font-size: 2.2rem;
    }

    .painel-media-fullarea .media-slide-caption {
      font-size: 1.3rem;
    }

    .painel-media-fullarea .media-dot {
      width: 10px;
      height: 10px;
    }

    .painel-media-fullarea .media-dots {
      bottom: 16px;
    }

    /* Animação zoom ao chamar senha */
    @keyframes zoom-in-call {
      0%   { transform: scale(0.4); opacity: 0; }
      60%  { transform: scale(1.08); }
      100% { transform: scale(1);   opacity: 1; }
    }

    .current-call-number.zoom-in {
      animation: zoom-in-call 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* =========================================================
       Overlay fullscreen de chamada — estilo vibrante
       ========================================================= */
    @keyframes co-fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes co-super-zoom {
      0%   { transform: scale(0.95); filter: drop-shadow(0 0 10px var(--co-color-glow, rgba(0,123,255,0.2))); }
      50%  { transform: scale(1.05); filter: drop-shadow(0 0 50px var(--co-color-glow, rgba(0,123,255,0.6))); }
      100% { transform: scale(0.95); filter: drop-shadow(0 0 10px var(--co-color-glow, rgba(0,123,255,0.2))); }
    }

    @keyframes co-label-in {
      0%   { letter-spacing: 0.6em; opacity: 0; }
      100% { letter-spacing: 0.5vw; opacity: 1; }
    }

    @keyframes co-badge-in {
      0%   { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    .call-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      text-align: center;
      overflow: hidden;
      font-family: 'Arial Black', 'Barlow Condensed', sans-serif;
      /* Desfoco do conteúdo atrás */
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      background: rgba(244, 249, 255, 0.93);
      animation: co-fade-in 0.2s ease forwards;
      transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
    }

    .call-overlay.fade-exit {
      transform: scale(0.9);
      opacity: 0;
    }

    .call-overlay-label {
      color: var(--co-color, #004a99);
      font-size: 3vw;
      text-transform: uppercase;
      letter-spacing: 0.5vw;
      margin-bottom: -2vw;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      animation: co-label-in 0.4s ease 0.05s both;
      position: relative;
      z-index: 1;
    }

    .call-overlay-number {
      font-size: 45vw;
      font-weight: 900;
      color: var(--co-color, #007bff);
      display: inline-block;
      line-height: 1;

  <!-- Firebase config + sync (configure sua chave aqui) -->
  <script>
    // --- SINCRONIZAÇÃO LOCAL (Substitui Firebase) ---
    const URL_PARAMS = new URLSearchParams(window.location.search);
    window.STATION_MODE = URL_PARAMS.get('mode') || null;

    // Se o parâmetro ?server=IP_DO_SERVIDOR estiver presente, usa esse IP.
    // Caso contrário, usa o IP de onde a página foi carregada.
    window.SERVER_IP = URL_PARAMS.get('server') || window.location.hostname || 'localhost';
    window.API_URL   = `http://${window.SERVER_IP}:3080/api/state`;

    console.log('[Sync] Servidor base:', window.API_URL);

    // Publica estado no Servidor Local
    window.localPush = function(state) {
      fetch(window.API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      }).catch(e => console.error('[Sync] Erro ao salvar:', e));
    };

    // Escuta mudanças via SSE (Server-Sent Events) — tempo real
    // Fallback para polling se SSE não estiver disponível
    window.localListen = function(onUpdate) {
      const SSE_URL = `http://${window.SERVER_IP}:3080/api/events`;

      function connectSSE() {
        try {
          const es = new EventSource(SSE_URL);

          es.onmessage = (e) => {
            try {
              const data = JSON.parse(e.data);
              const oldStr = JSON.stringify(window.APP_STATE);
              const newStr = JSON.stringify(data);
              if (oldStr !== newStr) {
                Object.assign(window.APP_STATE, data);
                onUpdate();
              }
            } catch (err) { /* ignora parse errors */ }
          };

          es.onerror = () => {
            console.warn('[SSE] Conexão perdida, reconectando em 2s...');
            es.close();
            setTimeout(connectSSE, 2000);
          };

          console.log('[SSE] Conectado a', SSE_URL);
        } catch (e) {
          // Fallback para polling se EventSource não disponível
          console.warn('[SSE] Não disponível, usando polling');
          const poll = async () => {
            try {
              const res = await fetch(window.API_URL);
              if (res.ok) {
                const data = await res.json();
                const oldStr = JSON.stringify(window.APP_STATE);
                const newStr = JSON.stringify(data);
                if (oldStr !== newStr) { Object.assign(window.APP_STATE, data); onUpdate(); }
              }
            } catch (e) { /* silencioso */ }
          };
          setInterval(poll, 1500);
          poll();
        }
      }

      connectSSE();
    };

    // Aliases para compatibilidade
    window.fbPush = window.localPush;
    window.fbListen = window.localListen;
  </script>

  <script type="text/babel">
    // =========================================================
    // FACTORY STATE — estado inicial de fábrica
    // =========================================================
    const FACTORY_STATE = {
      config: {
        unitName: 'Minha Empresa',
        sectorName: 'Painel de senha do Ni',
        companySlogan: '',
        logoUrl: '',               // URL ou path do logo
        welcomeMessage: 'Seja bem-vindo! Retire sua senha e aguarde ser chamado.',
        footerMessage: 'Painel de senha do Ni — Atendimento de Segunda a Sexta, 8h às 18h',
        workingHours: { start: '08:00', end: '18:00' },
        pauseMediaOnCall: true,
        overlayDuration: 5,        // Duração do overlay em segundos
        enableCallSound: true,      // Habilitar som de chamada
        callSoundMode: 'both',      // 'bell' | 'voice' | 'both' | 'none'
        soundVolume: 0.8,          // Volume do som (0.0 a 1.0)
        staffUnlockCode: '1234',   // Código para desbloquear totem após erro
        enableDigitalTicket: false, // QR Code opcional
        printerPort: '',            // Porta da impressora (ex: TMUSB001). Vazio = automático
      },
      services: [
        { id: 'general',  label: 'Geral',        color: '#2563eb', active: true, counter: 0, priority: 1 },
        { id: 'priority', label: 'Preferencial',  color: '#059669', active: true, counter: 0, priority: 2 },
      ],
      stations: [
        { id: 1, label: 'Guichê 1', active: true },
        { id: 2, label: 'Guichê 2', active: true },
      ],
      queue: [],
      called: [],
      currentCall: null,
      mediaItems: [
        { id: '1', title: 'Bem-vindo ao Painel de senha do Ni',        caption: '',                          url: '', fallbackColor: '#1e3a8a', duration: 6, active: true, order: 1 },
        { id: '2', title: 'Horário: 8h às 18h',         caption: 'Seg a Sex',                 url: '', fallbackColor: '#064e3b', duration: 6, active: true, order: 2 },
        { id: '3', title: 'Atendimento Preferencial',   caption: 'Idoso · PCD · Gestante',    url: '', fallbackColor: '#4c1d95', duration: 6, active: true, order: 3 },
      ],
    };

    // =========================================================
    // APP STATE — cópia profunda do estado de fábrica
    // =========================================================
    window.APP_STATE = JSON.parse(JSON.stringify(FACTORY_STATE));

    // =========================================================
    // dispatchUpdate — será sobrescrito pelo componente App
    // =========================================================
    window.dispatchUpdate = () => {};

    // =========================================================
    // generateTicket — Task 4.1
    // =========================================================
    function generateTicket(serviceId) {
      const s = window.APP_STATE;
      const service = s.services.find(sv => sv.id === serviceId);
      if (!service || !service.active) return null;

      // Ciclo 001–999
      const nextCounter = (service.counter % 999) + 1;
      service.counter = nextCounter;
      const ticket = String(nextCounter).padStart(3, '0');

      s.queue.push({
        id: crypto.randomUUID(),
        ticket,
        serviceId,
        time: Date.now(),
      });

      window.dispatchUpdate();
      return ticket;
    }

    // =========================================================
    // callNext — Task 4.4
    // =========================================================
    function callNext(stationId, serviceId) {
      const s = window.APP_STATE;
      const station = s.stations.find(st => st.id === stationId);
      if (!station || !station.active) return;

      let candidate = null;

      if (serviceId) {
        // Chamada manual por tipo específico
        candidate = s.queue.find(q => q.serviceId === serviceId) || null;
      } else {
        // Respeita prioridade: maior priority primeiro, desempate por menor time
        const activeServiceIds = s.services
          .filter(sv => sv.active)
          .sort((a, b) => b.priority - a.priority)
          .map(sv => sv.id);

        for (const sid of activeServiceIds) {
          const item = s.queue.find(q => q.serviceId === sid);
          if (item) { candidate = item; break; }
        }

        // Desempate por time se mesma priority
        if (!candidate) return;
      }

      if (!candidate) return;

      s.queue = s.queue.filter(q => q.id !== candidate.id);

      const call = {
        ticket: candidate.ticket,
        serviceId: candidate.serviceId,
        stationId,
        time: Date.now(),
      };

      s.called.push(call);
      s.currentCall = { ...call, _t: Date.now() }; // Inclui timestamp para forçar sincronia

      window.dispatchUpdate();
    }

    // =========================================================
    // retroceder — Volta para a senha anterior do guichê
    // =========================================================
    function retroceder(stationId) {
      const s = window.APP_STATE;
      
      // 1. Encontra a última chamada deste guichê
      const lastCalls = s.called.filter(c => c.stationId === stationId);
      if (lastCalls.length === 0) return;

      const lastCall = lastCalls[lastCalls.length - 1];

      // 2. Remove do histórico de chamadas
      s.called = s.called.filter(c => c !== lastCall);

      // 3. Devolve para o início da fila (fila é priorizada por time, então colocamos um time bem antigo)
      s.queue.unshift({
        id: crypto.randomUUID(),
        ticket: lastCall.ticket,
        serviceId: lastCall.serviceId,
        time: 0 // Força a senha a ser a primeira da fila novamente
      });

      // 4. Define a chamada atual como a penúltima chamada (se houver) ou limpa
      const prevCalls = s.called.filter(c => c.stationId === stationId);
      if (prevCalls.length > 0) {
        const prev = prevCalls[prevCalls.length - 1];
        s.currentCall = { ...prev, _t: Date.now() };
      } else {
        s.currentCall = null;
      }

      window.dispatchUpdate();
    }

    // =========================================================
    // repeatCall — Task 4.9
    // =========================================================
    function repeatCall() {
      if (!window.APP_STATE.currentCall) return;
      // Atualiza apenas o timestamp para forçar o useEffect do Painel a disparar o som
      window.APP_STATE.currentCall._t = Date.now();
      window.dispatchUpdate();
    }

    // =========================================================
    // exportHistory — Task 4.10
    // =========================================================
    function exportHistory() {
      const data = window.APP_STATE.called.map(c => ({
        ticket: c.ticket,
        serviceId: c.serviceId,
        stationId: c.stationId,
        time: c.time,

    function importBackup() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = event => {
          try {
            const backup = JSON.parse(event.target.result);
            
            // Validação básica
            if (!backup.version || !backup.config || !backup.services || !backup.stations) {
              alert('Arquivo de backup inválido!');
              return;
            }
            
            if (!window.confirm('ATENÇÃO: Restaurar backup irá substituir TODAS as configurações atuais. Confirma?')) {
              return;
            }
            
            // Restaura usando cópia profunda para evitar referências compartilhadas
            const restored = JSON.parse(JSON.stringify({
              config:      backup.config,
              services:    backup.services,
              stations:    backup.stations,
              mediaItems:  backup.mediaItems  || [],
              called:      backup.called      || [],
              queue:       backup.queue       || [],
              currentCall: backup.currentCall || null,
            }));

            // Aplica diretamente no APP_STATE campo a campo
            // (não substitui a referência para não quebrar listeners)
            const s = window.APP_STATE;
            s.config      = restored.config;
            s.services    = restored.services;
            s.stations    = restored.stations;
            s.mediaItems  = restored.mediaItems;
            s.called      = restored.called;
            s.queue       = restored.queue;
            s.currentCall = restored.currentCall;
            
            // Publica no Firebase e força re-render — sem reload
            window.dispatchUpdate();
            alert('Backup restaurado com sucesso!');
          } catch (err) {
            console.error('Erro ao importar backup:', err);
            alert('Erro ao ler arquivo de backup: ' + err.message);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

      const htmlWithScript = html.replace('</body>', `<script>

      const win = window.open('', '_blank', 'width=400,height=600');

    // =========================================================
    // TotemModule — Tasks 6.1, 6.2, 6.3
    // =========================================================
    function TotemModule() {
      const s = window.APP_STATE;
      const [modal, setModal] = React.useState(null);
      const [paperStatus, setPaperStatus] = React.useState(null); // null | 'near' | 'out'
      const [errorReason, setErrorReason] = React.useState(null); // null | 'paper-out' | 'print-failed' | 'printer-error'
      const activeServices = s.services.filter(sv => sv.active);
      const isElectron = !!(window.electronAPI && window.electronAPI.isElectron);

      React.useEffect(() => {
        if (isElectron) {
          // Electron: escuta status real da impressora via IPC
          window.electronAPI.getPaperStatus().then(status => {
            if (status === 'out') {
              setErrorReason('paper-out');
            } else if (status === 'near') {
              setPaperStatus('near');
            }
          });
          window.electronAPI.onPaperStatusChange((status) => {
            if (status === 'out') {
              setErrorReason('paper-out');
              setPaperStatus(null);
            } else if (status === 'near') {
              setPaperStatus('near');
              setErrorReason(null);
            } else {
              setPaperStatus(null);
              setErrorReason(null);
            }
          });
          
          // Polling mais frequente para detectar problemas rapidamente
          const checkPrinterStatus = () => {
            window.electronAPI.getPaperStatus().then(status => {
              if (status === 'out') {
                setErrorReason('paper-out');
                setPaperStatus(null);
              } else if (status === 'near') {
                setPaperStatus('near');
                if (errorReason === 'paper-out') setErrorReason(null);
              } else {
                if (errorReason === 'paper-out') setErrorReason(null);
                setPaperStatus(null);
              }
            }).catch(err => {
              console.error('Erro ao verificar status da impressora:', err);
            });
          };
          
          // Verifica a cada 3 segundos
          const interval = setInterval(checkPrinterStatus, 3000);
          
          return () => {
            clearInterval(interval);
            window.electronAPI.offPaperStatusChange();
          };
        } else {
          // Browser: polling via WebUSB (fallback, limitado)
          const poll = async () => {
            if (!navigator.usb) return;
            try {
              const devices = await navigator.usb.getDevices();
              const printer = devices.find(d => d.vendorId === 0x0DD4);
              if (!printer) return;
              await printer.open();
              if (printer.configuration === null) await printer.selectConfiguration(1);
              await printer.claimInterface(0);
              await printer.transferOut(1, new Uint8Array([0x10, 0x04, 0x04]));
              const result = await printer.transferIn(1, 1);
              const byte = result.data.getUint8(0);
              await printer.releaseInterface(0);
              await printer.close();
              const out  = (byte & 0x08) !== 0;
              const near = (byte & 0x04) !== 0;
              if (out) {
                setErrorReason('paper-out');
                setPaperStatus(null);
              } else {
                setPaperStatus(near ? 'near' : null);
                setErrorReason(null);
              }
            } catch { /* WebUSB não disponível em file:// */ }
          };
          poll();
          const interval = setInterval(poll, 5000); // Polling a cada 5 segundos
          return () => clearInterval(interval);
        }
      }, [isElectron]);

      // Callback de erro de impressão
      const handlePrintError = (reason) => {
        setErrorReason(reason || 'print-failed');
        setPaperStatus(null);
      };

      return (
        <div className="totem">
          <div className="totem-header">
            {s.config.logoUrl && <img src={s.config.logoUrl} className="totem-logo" alt="Logo" />}
            <div className="totem-sector">{s.config.sectorName}</div>
          </div>
          {s.config.companySlogan && <div className="totem-slogan">{s.config.companySlogan}</div>}
          <div className="totem-instruction">Toque para retirar sua senha</div>
          {activeServices.length === 0 ? (
            <div className="totem-unavailable">⚠️ Sistema temporariamente indisponível</div>
          ) : (
            <div className="totem-buttons">
              {activeServices.map(svc => (
                <ServiceButton
                  key={svc.id}
                  service={svc}
                  onPaperOut={(status) => {
                    if (status === 'out') {
                      setErrorReason('paper-out');
                      setPaperStatus(null);
                    } else {
                      setPaperStatus(status);
                    }
                  }}
                  onPrintError={handlePrintError}
                  onTicketGenerated={(ticket, service) => {
                    if (errorReason || paperStatus === 'out') return;
                    setModal({ ticket, service });
                  }}
                />
              ))}
            </div>
          )}
          {modal && (
            <TicketModal
              ticket={modal.ticket}
              service={modal.service}
              onClose={() => setModal(null)}
            />
          )}
          {/* Aviso leve: papel acabando (near) */}
          {paperStatus === 'near' && !errorReason && (
            <PaperOutCard
              status="near"
              onDismiss={() => setPaperStatus(null)}
            />
          )}
          {/* Erro crítico: papel acabou ou falha de impressão — bloqueia o totem */}
          {errorReason && (
            <ErrorCard
              reason={errorReason}
              onDismiss={() => {
                setErrorReason(null);
                setPaperStatus(null);
              }}
            />
          )}
          {/* QR Code Opcional (Sugestão Digital) */}
          {s.config.enableDigitalTicket && (
            <div className="totem-digital-info">
              <span>Acompanhe sua senha pelo celular:</span>
              <div className="totem-qr-placeholder">
                <span style={{fontSize:'0.6rem'}}>QR CODE</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    // =========================================================
    // MediaCarousel — Tasks 7.5, 7.6
    // =========================================================
    function MediaCarousel({ paused }) {
      const s = window.APP_STATE;
      const activeSlides = s.mediaItems
        .filter(m => m.active)
        .sort((a, b) => a.order - b.order);
      const [idx, setIdx] = React.useState(0);
      const videoRef = React.useRef(null);

      // Imagens: avança após duration. Vídeos: avançam via onEnded.
      React.useEffect(() => {
        if (activeSlides.length === 0 || paused) return;
        const slide = activeSlides[idx % activeSlides.length];
        if (slide?.fileType === 'video' || /\.(mp4|webm|ogg)$/i.test(slide?.url || '')) return;
        const duration = (slide?.duration || 6) * 1000;
        const t = setTimeout(() => setIdx(i => (i + 1) % activeSlides.length), duration);
        return () => clearTimeout(t);
      }, [idx, paused, activeSlides.length]);

      // Pause/resume do vídeo quando overlay aparece/desaparece
      React.useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        if (paused) {
          video.pause();
        } else {
          // Retoma de onde parou (currentTime é preservado)
          video.play().catch(() => {});
        }
      }, [paused]);

      // Cleanup do vídeo quando componente desmonta
      React.useEffect(() => {
        return () => {
          if (videoRef.current) {
            try {
              videoRef.current.pause();
              videoRef.current.src = '';
              videoRef.current.load();
            } catch (err) {
              console.error('Erro ao limpar vídeo:', err);
            }
          }
        };
      }, []);

      if (activeSlides.length === 0) return null;
      const slide = activeSlides[idx % activeSlides.length];
      const isVideo = slide.fileType === 'video' || /\.(mp4|webm|ogg)$/i.test(slide.url || '');

      const bgStyle = (!isVideo && slide.url)
        ? { backgroundImage: `url(${slide.url})` }
        : { background: slide.fallbackColor };

      const handleVideoEnded = () => {
        try {
          setIdx(i => (i + 1) % activeSlides.length);
        } catch (err) {
          console.error('Erro ao avançar slide de vídeo:', err);
        }
      };

      const handleVideoError = (e) => {
        console.error('Erro ao carregar vídeo:', e);
        setIdx(i => (i + 1) % activeSlides.length);
      };

      return (
        <div className="media-carousel">
          {isVideo ? (
            <video
              ref={videoRef}
              key={slide.url}
              src={slide.url}
              autoPlay={!paused}
              muted
              loop={false}
              playsInline
              style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover' }}
              onEnded={handleVideoEnded}
              onError={handleVideoError}
            />
          ) : (
            <div className="media-slide" style={bgStyle}>
              <div className="media-slide-overlay" />
              <div className="media-slide-content">
                <div className="media-slide-title">{slide.title}</div>
                {slide.caption && <div className="media-slide-caption">{slide.caption}</div>}
              </div>
            </div>
          )}
          <div className="media-dots">
            {activeSlides.map((_, i) => (
              <div key={i} className={`media-dot${i === idx % activeSlides.length ? ' active' : ''}`} />
            ))}
          </div>
        </div>
      );
    }

      React.useEffect(() => {
        if (bellInitializedRef.current) return;
        bellInitializedRef.current = true;

        if (window.electronAPI?.getBellBase64) {
          window.electronAPI.getBellBase64().then(dataUrl => {
            if (dataUrl && !bellAudioRef.current) {
              try {
                bellAudioRef.current = new Audio(dataUrl);
                bellAudioRef.current.volume = s.config.soundVolume || 0.8;
                bellAudioRef.current.load();
              } catch (err) {
                console.error('Erro ao inicializar campainha:', err);
              }
            }
          }).catch(err => {
            console.error('Erro ao obter base64 da campainha:', err);
          });
        } else if (window.electronAPI?.getBellUrl) {
          window.electronAPI.getBellUrl().then(url => {
            if (url && !bellAudioRef.current) {
              try {
                bellAudioRef.current = new Audio(url);
                bellAudioRef.current.volume = s.config.soundVolume || 0.8;
              } catch (err) {
                console.error('Erro ao inicializar campainha:', err);
              }
            }
          }).catch(err => {
            console.error('Erro ao obter URL da campainha:', err);
          });
        }
      }, []);

      // Função para tocar som de chamada
      const playCallSound = React.useCallback((ticket, stationLabel) => {
        try {
          const mode = s.config.callSoundMode || 'both';
          if (mode === 'none') return;

          const volume = s.config.soundVolume || 0.8;

          // Campainha (MP3)
          if (mode === 'bell' || mode === 'both') {
            if (bellAudioRef.current) {
              bellAudioRef.current.volume = volume;
              bellAudioRef.current.currentTime = 0;
              bellAudioRef.current.play().catch(err => {
                console.error('Erro ao tocar campainha:', err);
              });
            }
          }

          // Voz sintética
          if (mode === 'voice' || mode === 'both') {
            const delay = (mode === 'both' && bellAudioRef.current) ? 1200 : 0;
            setTimeout(() => {
              try {
                const utterance = new SpeechSynthesisUtterance(`Senha ${ticket}, ${stationLabel}`);
                utterance.lang   = 'pt-BR';
                utterance.volume = volume;
                utterance.rate   = 0.9;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
              } catch (err) {
                console.error('Erro ao sintetizar voz:', err);
              }
            }, delay);
          }
        } catch (err) {
          console.error('Erro em playCallSound:', err);
        }
      }, [s.config.callSoundMode, s.config.soundVolume]);

      // Função para fechar o overlay
      const closeOverlay = React.useCallback(() => {
        if (overlayTimerRef.current) {
          clearTimeout(overlayTimerRef.current);
          overlayTimerRef.current = null;
        }
        setOverlayFading(true);
        setTimeout(() => {
          setShowOverlay(false);
          setOverlayFading(false);
        }, 500);
      }, []);

      // Dispara overlay + som + destaque quando currentCall muda
      React.useEffect(() => {
        try {
          const cur = s.currentCall;
          const prev = prevCallRef.current;

          // Só age quando há uma chamada nova diferente da anterior
          if (!cur) return;
          if (JSON.stringify(cur) === JSON.stringify(prev)) return;

          prevCallRef.current = cur;

          // Cancela timers anteriores para evitar acúmulo
          if (overlayTimerRef.current) {
            clearTimeout(overlayTimerRef.current);
            overlayTimerRef.current = null;
          }

          // Abre overlay imediatamente (sobrepõe qualquer um aberto)
          setOverlayFading(false);
          setShowOverlay(true);
          setFlash(true);
          setZoomIn(true);
          setFadeOut(false); // Reset fadeOut para nova chamada

          // Toca som de chamada
          const curStation = s.stations.find(st => st.id === cur.stationId);
          playCallSound(cur.ticket, curStation?.label || `Guichê ${cur.stationId}`);

          // Destaque na lista de chamadas recentes
          setRecentHighlight(cur.ticket);

          if (s.config.pauseMediaOnCall) setMediaPaused(true);

          // Timers de limpeza
          const t1 = setTimeout(() => setFlash(false), 1200);
          const t2 = setTimeout(() => setZoomIn(false), 600);
          const t3 = setTimeout(() => setRecentHighlight(null), 2000);
          const t4 = setTimeout(() => setMediaPaused(false), 3000);

          // Fade-out e remoção do overlay
          const duration  = (s.config.overlayDuration || 5) * 1000;
          const fadeStart = Math.max(duration - 500, 0);

          overlayTimerRef.current = setTimeout(() => {
            setOverlayFading(true);
            setTimeout(() => {
              setShowOverlay(false);
              setOverlayFading(false);
              overlayTimerRef.current = null;
            }, 500);
          }, fadeStart);

          // Cleanup: cancela todos os timers se o componente desmontar
          return () => {
            clearTimeout(t1);
            clearTimeout(t2);
            clearTimeout(t3);
            clearTimeout(t4);
            if (overlayTimerRef.current) {
              clearTimeout(overlayTimerRef.current);
              overlayTimerRef.current = null;
            }
          };
        } catch (err) {
          console.error('Erro no useEffect de currentCall:', err);
        }
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [s.currentCall]);

      const cur = s.currentCall;
      const curService = cur ? s.services.find(sv => sv.id === cur.serviceId) : null;
      const curStation = cur ? s.stations.find(st => st.id === cur.stationId) : null;

      // Recent calls: last 5 from called (excluding current)
      const recentCalls = [...s.called].reverse().slice(0, 5);

      const dateStr = clock.toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
      const timeStr = clock.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      return (
        <div className="painel">
          <div className="painel-header">
            <div className="painel-header-brand">
              {s.config.logoUrl && <img src={s.config.logoUrl} className="painel-logo" alt="Logo" />}
              <div className="painel-header-text">
                <span className="painel-header-sector">{s.config.sectorName}</span>
                <span className="painel-header-unit">{s.config.unitName}</span>
              </div>
            </div>
            {s.config.companySlogan && <div className="painel-slogan">{s.config.companySlogan}</div>}
          </div>
          <div className="painel-body">
            {/* Área principal — mídia indoor sempre em tela cheia */}
            <div className="painel-main painel-main--media">
              <MediaCarousel paused={mediaPaused} />
            </div>

            {/* Sidebar — últimas chamadas no topo, senha atual embaixo */}
            <div className="painel-sidebar">

              {/* Últimas chamadas — topo */}
              <div className="recent-calls">
                <div className="recent-calls-title">Últimas chamadas</div>
                {recentCalls.length === 0 ? (
                  <div style={{ color: 'var(--text-muted)', fontSize: '0.9rem', fontFamily: 'Rajdhani' }}>Nenhuma chamada ainda</div>
                ) : recentCalls.map((c, i) => {
                  const svc = s.services.find(sv => sv.id === c.serviceId);
                  const st = s.stations.find(st => st.id === c.stationId);
                  const t = new Date(c.time).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                  const isHighlighted = c.ticket === recentHighlight;
                  return (
                    <div key={i} className={`recent-call-item${isHighlighted ? ' highlight' : ''}`}>
                      <span className="recent-call-ticket" style={{ color: svc?.color }}>{c.ticket}</span>
                      <span className="recent-call-meta">{svc?.label} · {st?.label || `G${c.stationId}`} · {t}</span>
                    </div>
                  );
                })}
              </div>

              {/* Senha atual — embaixo */}
              {cur ? (
                <div className={`current-call-area${fadeOut ? ' fade-exit' : ''}`}>
                  <div className="current-call-label">Senha Atual</div>
                  <div
                    className={`current-call-number${flash ? ' flash' : ''}${zoomIn ? ' zoom-in' : ''}`}
                    style={{ color: curService?.color || 'var(--accent)', fontSize: '5rem' }}
                  >
                    {cur.ticket}
                  </div>
                  <span
                    className="current-call-type"
                    style={{ background: curService?.color || 'var(--accent)' }}
                  >
                    {curService?.label || cur.serviceId}
                  </span>
                  <div className="current-call-station">
                    {curStation?.label || `Guichê ${cur.stationId}`}
                  </div>
                  {/* Contadores de fila */}
                  <div className="queue-counters" style={{ flexDirection: 'column', gap: '0.4rem', marginTop: '0.75rem' }}>
                    {s.services.filter(sv => sv.active).map(svc => {
                      const count = s.queue.filter(q => q.serviceId === svc.id).length;
                      return (
                        <div key={svc.id} className="queue-counter-card" style={{ borderColor: svc.color }}>
                          <div className="queue-counter-value" style={{ color: svc.color, fontSize: '1.5rem' }}>{count}</div>
                          <div className="queue-counter-label">{svc.label} aguardando</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ) : (
                <div className="painel-waiting" style={{ padding: '1.5rem', textAlign: 'center', borderTop: '1px solid var(--border)' }}>
                  <div style={{ fontSize: '2.5rem' }}>🎫</div>
                  <div className="painel-waiting-text" style={{ fontSize: '1.2rem' }}>Aguardando chamada...</div>
                </div>
              )}
            </div>
          </div>
          <div className="painel-footer">
            <span>{s.config.footerMessage}</span>
            <span>{dateStr} · {timeStr}</span>
          </div>
          {/* Overlay fullscreen de chamada */}
          {showOverlay && cur && (() => {
            const color = curService?.color || '#2563eb';
            const totalQueue = s.queue.length;
            // Gera versão clara e glow da cor do serviço
            return (
              <div
                className={`call-overlay${overlayFading ? ' fade-exit' : ''}`}
                onClick={closeOverlay}
                style={{
                  '--co-color':       color,
                  '--co-color-light': `${color}22`,
                  '--co-color-glow':  `${color}55`,
                  '--co-bg':          `${color}0d`,
                  cursor: 'pointer',
                }}
              >
                <div className="call-overlay-label">Senha Chamada</div>
                <div className="call-overlay-number">{cur.ticket}</div>
                <div className="call-overlay-station">
                  {curStation?.label || `Guichê ${cur.stationId}`}
                </div>
                {/* Fila visível no rodapé */}
                {totalQueue > 0 && (
                  <div className="call-overlay-queue">
                    {totalQueue} senha{totalQueue !== 1 ? 's' : ''} aguardando
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      );
    }

    // =========================================================
    // OperadorModule — Tasks 8.1, 8.2, 8.3
    // =========================================================
    function OperadorModule() {
      const s = window.APP_STATE;
      const activeStations = s.stations.filter(st => st.active);
      const [stationId, setStationId] = React.useState(activeStations[0]?.id || 1);

      // Atalhos de teclado (Task 8.2)
      React.useEffect(() => {
        const handleKeys = (e) => {
          if (e.code === 'Space') {
            e.preventDefault();
            if (s.queue.length > 0) callNext(stationId);
          } else if (e.code === 'KeyR') {
            if (s.currentCall) repeatCall();
          }
        };
        window.addEventListener('keydown', handleKeys);
        return () => window.removeEventListener('keydown', handleKeys);
      }, [stationId, s.queue.length, s.currentCall]);

      const allEmpty = s.queue.length === 0;

      return (
        <div className="operador">
          {/* Aviso de papel para o operador */}
          {s.paperStatus === 'out' && (
            <div style={{ background: 'var(--danger)', color: '#fff', padding: '1rem', borderRadius: 'var(--radius)', marginBottom: '1rem', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '1rem', animation: 'pulse-danger 2s infinite' }}>
              <span style={{ fontSize: '1.5rem' }}>🖨️</span>
              <div>
                <strong>Atenção: Impressora sem papel!</strong><br />
                O totem está bloqueado e não emitirá novas senhas até que o papel seja reposto.
              </div>
            </div>
          )}

          {/* Header */}
          <div className="operador-header">
            <div className="operador-header-title">Painel de senha do Ni — Operador</div>
            <div className="operador-station-selector">
              <span>Guichê:</span>
              <select value={stationId} onChange={e => setStationId(Number(e.target.value))}>
                {activeStations.map(st => (
                  <option key={st.id} value={st.id}>{st.label}</option>
                ))}
              </select>
            </div>
          </div>

          {/* Summary cards */}
          <div className="operador-summary-cards">
            {s.services.filter(sv => sv.active).map(svc => {
              const count = s.queue.filter(q => q.serviceId === svc.id).length;
              const lastCalled = [...s.called].reverse().find(c => c.serviceId === svc.id);
              return (
                <div key={svc.id} className="summary-card" style={{ borderLeftColor: svc.color }}>
                  <div className="summary-card-label">{svc.label}</div>
                  <div className="summary-card-count" style={{ color: svc.color }}>{count}</div>
                  {count === 0
                    ? <div className="summary-card-empty">⚠ Fila vazia</div>
                    : <div className="summary-card-last">na fila</div>
                  }
                  {lastCalled && (
                    <div className="summary-card-last">Última: <strong>{lastCalled.ticket}</strong></div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Controls */}
          <div className="operador-controls">
            <button
              className="btn btn-primary"
              disabled={allEmpty}
              onClick={() => callNext(stationId)}
            >
              🔔 Chamar Próxima Senha
            </button>
            <button
              className="btn btn-secondary"
              disabled={!s.currentCall}
              onClick={() => repeatCall()}
            >
              🔁 Repetir Chamada
            </button>
            {s.services.filter(sv => sv.active).map(svc => {
              const empty = s.queue.filter(q => q.serviceId === svc.id).length === 0;
              return (
                <button
                  key={svc.id}
                  className="btn"
                  style={{ background: svc.color, color: '#fff', opacity: empty ? 0.4 : 1 }}
                  disabled={empty}
                  onClick={() => callNext(stationId, svc.id)}
                >
                  Chamar {svc.label}
                </button>
              );
            })}
          </div>

          {/* Call history table */}
          <div style={{ background: 'var(--bg-secondary)', borderRadius: 'var(--radius-lg)', border: '1px solid var(--border)', overflow: 'hidden' }}>
            <table className="call-history-table">
              <thead>
                <tr>
                  <th>Senha</th>
                  <th>Tipo</th>
                  <th>Guichê</th>
                  <th>Horário</th>
                </tr>
              </thead>
              <tbody>
                {s.called.length === 0 ? (
                  <tr><td colSpan="4" style={{ color: 'var(--text-muted)', textAlign: 'center', padding: '2rem' }}>Nenhuma chamada realizada</td></tr>
                ) : [...s.called].reverse().map((c, i) => {
                  const svc = s.services.find(sv => sv.id === c.serviceId);
                  const st = s.stations.find(st => st.id === c.stationId);
                  const t = new Date(c.time).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                  return (
                    <tr key={i}>
                      <td><span className="ticket-badge" style={{ color: svc?.color }}>{c.ticket}</span></td>
                      <td><span className="type-badge" style={{ background: svc?.color }}>{svc?.label || c.serviceId}</span></td>
                      <td>{st?.label || `Guichê ${c.stationId}`}</td>
                      <td style={{ color: 'var(--text-muted)' }}>{t}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // =========================================================
    // AdminModule — Tasks 10.1, 10.2, 10.3, 11.1, 11.2, 11.4
    // =========================================================
    function AdminModule() {
      const s = window.APP_STATE;
      const [tab, setTab] = React.useState('dashboard');

      const tabs = [
        { id: 'dashboard', label: '📊 Dashboard' },
        { id: 'services',  label: '🎫 Tipos de Senha' },

        { id: 'stations',  label: '🏢 Guichês' },
        { id: 'settings',  label: '⚙️ Configurações' },
      ];

      return (
        <div className="admin">
          <div className="admin-header">
            <div className="admin-header-title">Painel de senha do Ni — Administrador</div>
          </div>
          <div className="admin-tabs">
            {tabs.map(t => (
              <button key={t.id} className={`admin-tab${tab === t.id ? ' active' : ''}`} onClick={() => setTab(t.id)}>{t.label}</button>

    // --- Dashboard Tab ---
    function AdminDashboard() {
      const s = window.APP_STATE;
      const activeCount = s.services.filter(sv => sv.active).length;
      const statusLabel = activeCount === 2 ? 'Operacional' : activeCount === 1 ? 'Parcial' : 'Indisponível';
      const statusClass = activeCount === 2 ? 'status-ok' : activeCount === 1 ? 'status-partial' : 'status-off';

      // Hourly chart: count called per hour (0-23)
      const hourCounts = Array(24).fill(0);
      s.called.forEach(c => { const h = new Date(c.time).getHours(); hourCounts[h]++; });
      const maxH = Math.max(...hourCounts, 1);
      const now = new Date().getHours();

      const totalIssued = s.services.reduce((a, sv) => a + sv.counter, 0);
      const totalCalled = s.called.length;
      const waiting = s.queue.length;
      const activeStations = s.stations.filter(st => st.active).length;

      return (
        <div>
          <div className="metrics-grid">
            <div className="metric-card"><div className="metric-label">Emitidas hoje</div><div className="metric-value" style={{color:'var(--accent)'}}>{totalIssued}</div></div>
            <div className="metric-card"><div className="metric-label">Chamadas hoje</div><div className="metric-value" style={{color:'var(--success)'}}>{totalCalled}</div></div>
            <div className="metric-card"><div className="metric-label">Aguardando</div><div className="metric-value" style={{color:'var(--warning)'}}>{waiting}</div></div>
            <div className="metric-card"><div className="metric-label">Guichês ativos</div><div className="metric-value">{activeStations}</div></div>
            {s.services.filter(sv => sv.active).map(svc => (
              <div key={svc.id} className="metric-card">
                <div className="metric-label">{svc.label} na fila</div>
                <div className="metric-value" style={{color: svc.color}}>{s.queue.filter(q => q.serviceId === svc.id).length}</div>
              </div>
            ))}
            <div className="metric-card"><div className="metric-label">Status</div><div style={{marginTop:'0.4rem'}}><span className={`status-badge ${statusClass}`}>{statusLabel}</span></div></div>
          </div>
          <div className="hourly-chart">
            <div className="hourly-chart-title">Emissões por hora (hoje)</div>
            <div className="hourly-bars">
              {hourCounts.map((v, h) => (
                <div key={h} className="hourly-bar-wrap">
                  <div className="hourly-bar" style={{height: `${(v/maxH)*100}%`, background: h === now ? 'var(--warning)' : 'var(--accent)'}} title={`${h}h: ${v}`} />
                  {h % 4 === 0 && <div className="hourly-bar-label">{h}h</div>}
                </div>
              ))}
            </div>
          </div>
          {window.electronAPI && <MobileAccessCard />}
        </div>
      );
    }

      const [port, setPort] = React.useState(3080);
      const [customPath, setCustomPath] = React.useState('/mobile.html');
      const [qrDataUrl, setQrDataUrl] = React.useState('');
      const [generating, setGenerating] = React.useState(false);

      const mobileUrl = ip === '...' ? '' : `http://${ip}:${port}${customPath}`;

      // Gera QR Code sempre que a URL mudar
      React.useEffect(() => {
        if (!mobileUrl || !window.electronAPI?.generateQrCode) return;
        setGenerating(true);
        window.electronAPI.generateQrCode(mobileUrl)
          .then(dataUrl => { if (dataUrl) setQrDataUrl(dataUrl); })
          .catch(() => {})
          .finally(() => setGenerating(false));
      }, [mobileUrl]);

      // Carrega IP local ao montar
      React.useEffect(() => {
        if (window.electronAPI?.getLocalIp) {
          window.electronAPI.getLocalIp().then(localIp => setIp(localIp));
        }

      return (
        <div className="admin-section" style={{marginTop:'1rem'}}>
          <div className="admin-section-title">📱 Acesso Mobile — Operador</div>
          <div style={{display:'flex',alignItems:'flex-start',gap:'1.5rem',flexWrap:'wrap',marginTop:'0.75rem'}}>
            {/* QR Code */}
            <div style={{flexShrink:0}}>
              {qrDataUrl && !generating ? (
                <img src={qrDataUrl} alt="QR Code" style={{width:160,height:160,borderRadius:'var(--radius)',border:'1px solid var(--border)',display:'block'}} />
              ) : (
                <div style={{width:160,height:160,background:'var(--bg-elevated)',borderRadius:'var(--radius)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Rajdhani',color:'var(--text-muted)',fontSize:'0.85rem',textAlign:'center',padding:'1rem'}}>
                  {generating ? '⏳ Gerando...' : ip === '...' ? 'Carregando...' : 'QR Code'}
                </div>
              )}
            </div>

            {/* Controles */}
            <div style={{flex:1,minWidth:260}}>
              <div style={{display:'flex',gap:'0.5rem',marginBottom:'0.5rem',flexWrap:'wrap'}}>
                <div style={{flex:'0 0 auto'}}>
                  <div style={{fontFamily:'Rajdhani',fontSize:'0.8rem',color:'var(--text-muted)',marginBottom:'0.2rem'}}>IP</div>
                  <input
                    style={{background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'0.35rem 0.6rem',fontFamily:'Courier New',fontSize:'0.95rem',color:'var(--text-primary)',width:160}}
                    value={ip}
                    onChange={e => setIp(e.target.value)}
                  />
                </div>
                <div style={{flex:'0 0 auto'}}>
                  <div style={{fontFamily:'Rajdhani',fontSize:'0.8rem',color:'var(--text-muted)',marginBottom:'0.2rem'}}>Porta</div>
                  <input
                    type="number"
                    style={{background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'0.35rem 0.6rem',fontFamily:'Courier New',fontSize:'0.95rem',color:'var(--text-primary)',width:90}}
                    value={port}
                    onChange={e => setPort(Number(e.target.value))}
                  />
                </div>
                <div style={{flex:1,minWidth:120}}>
                  <div style={{fontFamily:'Rajdhani',fontSize:'0.8rem',color:'var(--text-muted)',marginBottom:'0.2rem'}}>Caminho</div>
                  <input
                    style={{background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'0.35rem 0.6rem',fontFamily:'Courier New',fontSize:'0.95rem',color:'var(--text-primary)',width:'100%'}}
                    value={customPath}
                    onChange={e => setCustomPath(e.target.value)}
                  />
                </div>
              </div>

              <div style={{fontFamily:'Courier New',fontSize:'1rem',fontWeight:'bold',color:'var(--accent)',background:'var(--bg-elevated)',padding:'0.5rem 1rem',borderRadius:'var(--radius)',border:'1px solid var(--border)',userSelect:'all',wordBreak:'break-all',marginBottom:'0.5rem'}}>
