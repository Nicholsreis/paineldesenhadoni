    // --- Media Tab ---
    function AdminMedia() {
      const s = window.APP_STATE;
      const [, forceRender] = React.useState(0);
      const [localFiles, setLocalFiles] = React.useState([]);
      const [loadingLocal, setLoadingLocal] = React.useState(false);
      const refresh = () => { window.dispatchUpdate(); forceRender(n => n+1); };

      // Carrega lista de arquivos locais da pasta media/
      const loadLocalFiles = React.useCallback(async () => {
        if (!window.electronAPI?.listMediaFiles) return;
        setLoadingLocal(true);
        const files = await window.electronAPI.listMediaFiles();
        setLocalFiles(files);
        setLoadingLocal(false);
      }, []);

      React.useEffect(() => { loadLocalFiles(); }, []);

      const updateSlide = (id, field, val) => {
        const slide = s.mediaItems.find(m => m.id === id);
        if (slide) { slide[field] = val; refresh(); }
      };

      // Adiciona slide com arquivo local selecionado
      const addLocalSlide = (file) => {
        const maxOrder = s.mediaItems.reduce((a, m) => Math.max(a, m.order), 0);
        s.mediaItems.push({
          id: crypto.randomUUID(),
          title: file.name.replace(/\.[^.]+$/, ''),
          caption: '',
          url: file.url,
          fileType: file.type,  // 'image' | 'video'
          fallbackColor: '#1e293b',
          duration: file.type === 'video' ? 30 : 6,
          active: true,
          order: maxOrder + 1,
        });
        refresh();
      };

      const addSlide = () => {
        const maxOrder = s.mediaItems.reduce((a, m) => Math.max(a, m.order), 0);
        s.mediaItems.push({ id: crypto.randomUUID(), title: 'Novo Slide', caption: '', url: '', fileType: 'image', fallbackColor: '#1e293b', duration: 6, active: true, order: maxOrder + 1 });
        refresh();
      };

      const removeSlide = (id) => {
        if (window.confirm('Excluir este slide?')) { s.mediaItems = s.mediaItems.filter(m => m.id !== id); refresh(); }
      };

      const moveSlide = (id, dir) => {
        const sorted = [...s.mediaItems].sort((a,b) => a.order - b.order);
        const idx = sorted.findIndex(m => m.id === id);
        const swapIdx = idx + dir;
        if (swapIdx < 0 || swapIdx >= sorted.length) return;
        const tmp = sorted[idx].order;
        sorted[idx].order = sorted[swapIdx].order;
        sorted[swapIdx].order = tmp;
        refresh();
      };

      // Importa arquivo via diálogo do sistema
      const importFile = async () => {
        if (!window.electronAPI?.importMediaFile) return;
        const imported = await window.electronAPI.importMediaFile();
        if (imported && imported.length > 0) {
          await loadLocalFiles();
          imported.forEach(f => {
            // Só adiciona slide se ainda não existe
            if (!s.mediaItems.some(m => m.url === f.url)) addLocalSlide(f);
          });
        }
      };

      // Seleciona uma pasta — todos os arquivos viram slides automaticamente
      const selectFolder = async () => {
        if (!window.electronAPI?.selectMediaFolder) return;
        const result = await window.electronAPI.selectMediaFolder();
        if (result.canceled || !result.files.length) return;
        // Remove slides antigos que vieram de pasta (não da pasta media/)
        // e adiciona todos os arquivos da nova pasta
        result.files.forEach(f => {
          if (!s.mediaItems.some(m => m.url === f.url)) addLocalSlide(f);
        });
        alert(`✅ ${result.files.length} arquivo(s) adicionado(s) ao carrossel da pasta:\n${result.folder}`);
      };

      // Remove arquivo local da pasta media/
      const deleteLocalFile = async (filename) => {
        if (!window.electronAPI?.deleteMediaFile) return;
        if (!window.confirm(`Excluir o arquivo "${filename}" da pasta media/?`)) return;
        await window.electronAPI.deleteMediaFile(filename);
        // Remove slides que usavam esse arquivo
        const url = localFiles.find(f => f.name === filename)?.url;
        if (url) s.mediaItems = s.mediaItems.filter(m => m.url !== url);
        await loadLocalFiles();
        refresh();
      };

      const sorted = [...s.mediaItems].sort((a,b) => a.order - b.order);

      return (
        <div>
          <div className="admin-section" style={{marginBottom:'0.75rem'}}>
            <label style={{display:'flex',alignItems:'center',gap:'0.75rem',fontFamily:'Rajdhani',fontSize:'1rem'}}>
              <label className="toggle">
                <input type="checkbox" checked={s.config.pauseMediaOnCall} onChange={e => { s.config.pauseMediaOnCall = e.target.checked; refresh(); }} />
                <span className="toggle-slider" />
              </label>
              Pausar carrossel ao chamar senha
            </label>
          </div>

          {/* Arquivos locais disponíveis */}
          {window.electronAPI && (
            <div className="admin-section" style={{marginBottom:'0.75rem'}}>
              <div className="admin-section-title" style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'0.5rem'}}>
                <span>📁 Arquivos Locais (pasta media/)</span>
                <div style={{display:'flex',gap:'0.5rem'}}>
                  <button className="btn btn-secondary" style={{padding:'0.3rem 0.9rem',fontSize:'0.85rem'}} onClick={selectFolder} title="Selecionar uma pasta — todos os arquivos viram slides automaticamente">
                    📂 Usar Pasta
                  </button>
                  <button className="btn btn-primary" style={{padding:'0.3rem 0.9rem',fontSize:'0.85rem'}} onClick={importFile} title="Selecionar arquivos individuais e copiar para a pasta media/">
                    + Importar Arquivo
                  </button>
                </div>
              </div>
              {loadingLocal ? (
                <div style={{fontFamily:'Rajdhani',color:'var(--text-muted)',fontSize:'0.9rem'}}>Carregando...</div>
              ) : localFiles.length === 0 ? (
                <div style={{fontFamily:'Rajdhani',color:'var(--text-muted)',fontSize:'0.9rem'}}>
                  Nenhum arquivo na pasta <code>media/</code>. Clique em "Importar Arquivo" para adicionar.
                </div>
              ) : (
                <div style={{display:'flex',flexWrap:'wrap',gap:'0.75rem',marginTop:'0.5rem'}}>
                  {localFiles.map(f => (
                    <div key={f.name} style={{
                      background:'var(--bg-elevated)',
                      border:'1px solid var(--border)',
                      borderRadius:'var(--radius)',
                      padding:'0.5rem 0.75rem',
                      display:'flex',
                      alignItems:'center',
                      gap:'0.5rem',
                      fontFamily:'Rajdhani',
                      fontSize:'0.9rem',
                    }}>
                      <span>{f.type === 'video' ? '🎬' : '🖼'}</span>
                      <span style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={f.name}>{f.name}</span>
                      <button
                        className="btn btn-success"
                        style={{padding:'0.15rem 0.5rem',fontSize:'0.75rem'}}
                        onClick={() => addLocalSlide(f)}
                        title="Adicionar ao carrossel"
                      >+ Slide</button>
                      <button
                        className="btn btn-danger"
                        style={{padding:'0.15rem 0.5rem',fontSize:'0.75rem'}}
                        onClick={() => deleteLocalFile(f.name)}
                        title="Excluir arquivo"
                      >✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          <div className="admin-section">
            <div className="admin-section-title">Slides do Carrossel</div>
            {sorted.map((slide, i) => (
              <div key={slide.id} className="slide-editor-row">
                <div className="slide-preview" style={slide.url ? {backgroundImage:`url(${slide.url})`} : {background: slide.fallbackColor}} />
                <label className="toggle">
                  <input type="checkbox" checked={slide.active} onChange={e => updateSlide(slide.id, 'active', e.target.checked)} />
                  <span className="toggle-slider" />
                </label>
                <input className="admin-input" style={{width:140}} value={slide.title} onChange={e => updateSlide(slide.id, 'title', e.target.value)} placeholder="Título" />
                <input className="admin-input" style={{width:120}} value={slide.caption} onChange={e => updateSlide(slide.id, 'caption', e.target.value)} placeholder="Legenda" />
                <input className="admin-input" style={{width:160}} value={slide.url} onChange={e => updateSlide(slide.id, 'url', e.target.value)} placeholder="URL ou arquivo local" />
                <input type="color" value={slide.fallbackColor} onChange={e => updateSlide(slide.id, 'fallbackColor', e.target.value)} style={{width:36,height:28,border:'none',background:'none',cursor:'pointer'}} title="Cor de fallback" />
                <input className="admin-input" type="number" style={{width:70}} value={slide.duration} min={1} max={300} onChange={e => updateSlide(slide.id, 'duration', Number(e.target.value))} />
                <span style={{fontFamily:'Rajdhani',fontSize:'0.8rem',color:'var(--text-muted)'}}>s</span>
                <button className="btn btn-secondary" style={{padding:'0.25rem 0.5rem',fontSize:'0.8rem'}} onClick={() => moveSlide(slide.id, -1)} disabled={i===0}>▲</button>
                <button className="btn btn-secondary" style={{padding:'0.25rem 0.5rem',fontSize:'0.8rem'}} onClick={() => moveSlide(slide.id, 1)} disabled={i===sorted.length-1}>▼</button>
                <button className="btn btn-danger" style={{padding:'0.25rem 0.5rem',fontSize:'0.8rem'}} onClick={() => removeSlide(slide.id)}>✕</button>
              </div>
            ))}
            <button className="btn btn-success" style={{marginTop:'0.75rem'}} onClick={addSlide}>+ Adicionar Slide (URL)</button>
          </div>
        </div>
      );
    }

    function PrinterSection() {
      const s = window.APP_STATE;

      const [ports, setPorts] = React.useState([]);
      const [status, setStatus] = React.useState('');
      const [testMsg, setTestMsg] = React.useState('');

      React.useEffect(() => {
        // Carrega portas disponíveis
        if (window.electronAPI?.listPrinterPorts) {
          window.electronAPI.listPrinterPorts().then(p => setPorts(p || []));
        }
        // Carrega porta salva
        if (window.electronAPI?.getPrinterPort) {
          window.electronAPI.getPrinterPort().then(p => { if (p) setPort(p); });
        }
      }, []);

      const savePort = () => {
        s.config.printerPort = port;
        window.dispatchUpdate();
        if (window.electronAPI?.setPrinterPort) window.electronAPI.setPrinterPort(port);
        setTestMsg('✅ Porta salva!');
        setTimeout(() => setTestMsg(''), 2000);
      };

      const checkStatus = async () => {
        setStatus('verificando...');
        const r = await window.electronAPI.checkPrinterWMI();
        const labels = { ok: '✅ Pronta', 'out-of-paper': '🔴 Sem papel', offline: '🟡 Offline', error: '🔴 Erro' };
        setStatus(labels[r] || r);
      };

      const testPrint = async () => {
        setTestMsg('Enviando...');
        const r = await window.electronAPI.printTicket({
          ticket: { ticket: 'TESTE', serviceId: 'general' },
          state: s
        });
        setTestMsg(r.success ? '✅ Enviado! Verifique a impressora.' : '❌ Falha ao enviar.');
        setTimeout(() => setTestMsg(''), 4000);
      };

      return (
        <div className="admin-section">
          <div className="admin-section-title">🖨️ Impressora</div>
          <div className="settings-form">
            <div className="settings-field">
              <label className="settings-label">Porta da Impressora</label>

                  className="settings-input"
                  style={{flex:1,minWidth:180}}
                  value={port}
                  placeholder="Ex: TMUSB001, USB001, COM3 (vazio = automático)"

                  <select
                    style={{background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'0.4rem 0.5rem',fontFamily:'Rajdhani',color:'var(--text-primary)',cursor:'pointer'}}
                    value=""
                    onChange={e => { if (e.target.value) setPort(e.target.value); }}
                  >
                    <option value="">Selecionar impressora...</option>
                    {ports.map(p => (
                      <option key={p.port} value={p.port}>
                        {p.isDefault ? '★ ' : ''}{p.name} ({p.port})
                      </option>
                    ))}
                  </select>
                )}
              </div>
              <span style={{fontFamily:'Rajdhani',fontSize:'0.85rem',color:'var(--text-muted)',marginTop:'0.3rem'}}>
                Deixe vazio para usar a impressora padrão do Windows automaticamente.
              </span>
            </div>

              <button className="btn btn-primary" onClick={savePort}>💾 Salvar Porta</button>

              <button className="btn btn-info" onClick={testPrint}>🖨️ Imprimir Teste</button>

              {testMsg && <span style={{fontFamily:'Rajdhani',fontSize:'1rem'}}>{testMsg}</span>}
            </div>
          </div>
        </div>
      );

    // --- License Section (dentro de Settings) ---
    function LicenseSection() {
      const [saved, setSaved] = React.useState(null);
      const [msg, setMsg] = React.useState('');

      React.useEffect(() => {
        if (window.electronAPI?.licenseGetSaved) {
          window.electronAPI.licenseGetSaved().then(s => setSaved(s));
        }
      }, []);

      const handleDeactivate = async () => {
        if (!window.confirm('Desativar a licença? O app será bloqueado até uma nova ativação.')) return;
        await window.electronAPI.licenseClear();
        setMsg('Licença removida. Reinicie o app para reativar.');
        setSaved(null);
      };

      if (!saved?.license) return null;
      const lic = saved.license;
      const expFormatted = lic.expiration_date
        ? new Date(lic.expiration_date).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' })
        : 'Sem data';
      const days = lic.expiration_date
        ? Math.ceil((new Date(lic.expiration_date) - new Date()) / 86400000)
        : null;

      return (
        <div className="admin-section">
          <div className="admin-section-title">🔑 Licença</div>
          <div style={{fontFamily:'Rajdhani',fontSize:'1rem',display:'flex',flexDirection:'column',gap:'0.4rem'}}>

            <div><strong>Status:</strong> <span style={{color:'var(--success)'}}>{lic.status}</span></div>
            <div><strong>Válida até:</strong> {expFormatted} {days !== null ? `(${days} dias restantes)` : ''}</div>
            <div><strong>Código:</strong> <code style={{fontSize:'0.85rem',background:'var(--bg-elevated)',padding:'2px 6px',borderRadius:4}}>{saved.code}</code></div>
            {msg && <div style={{color:'var(--warning)',marginTop:'0.5rem'}}>{msg}</div>}
            <button className="btn btn-danger" style={{marginTop:'0.5rem',alignSelf:'flex-start',fontSize:'0.85rem'}} onClick={handleDeactivate}>
              🔓 Desativar Licença
            </button>
          </div>
        </div>
      );
    }

        callSoundMode: s.config.callSoundMode || 'both',
        soundVolume: s.config.soundVolume || 0.8,
        companySlogan: s.config.companySlogan || '',
        logoUrl: s.config.logoUrl || '',
        staffUnlockCode: s.config.staffUnlockCode || '1234',
        enableDigitalTicket: s.config.enableDigitalTicket || false,
        serverIp: window.SERVER_IP || 'localhost',
      });

      const save = () => {
        s.config.unitName = form.unitName;
        s.config.sectorName = form.sectorName;
        s.config.welcomeMessage = form.welcomeMessage;
        s.config.footerMessage = form.footerMessage;
        s.config.companySlogan = form.companySlogan;
        s.config.logoUrl = form.logoUrl;
        s.config.staffUnlockCode = form.staffUnlockCode;
        s.config.workingHours = { start: form.workingHoursStart, end: form.workingHoursEnd };
        s.config.overlayDuration = form.overlayDuration;
        s.config.enableCallSound = form.enableCallSound;
        s.config.callSoundMode   = form.callSoundMode;
        s.config.soundVolume = form.soundVolume;
        window.dispatchUpdate();
        alert('Configurações salvas!');
      };

      return (
        <div>
          <div className="admin-section">
            <div className="admin-section-title">Configurações Gerais</div>
            <div className="settings-form">
              {[['unitName','Nome da Unidade'],['sectorName','Nome do Setor'],['companySlogan','Slogan da Empresa'],['logoUrl','URL do Logo (ex: media/logo.png)'],['welcomeMessage','Mensagem de Boas-vindas (Totem)'],['footerMessage','Mensagem de Rodapé (Painel)']].map(([k,l]) => (
                <div key={k} className="settings-field">
                  <label className="settings-label">{l}</label>
                  <input className="settings-input" value={form[k]} onChange={e => setForm(f => ({...f, [k]: e.target.value}))} />
                </div>
              ))}
              <div className="settings-field">
                <label style={{display:'flex',alignItems:'center',gap:'0.75rem',fontFamily:'Rajdhani',fontSize:'1rem'}}>
                  <label className="toggle">
                    <input type="checkbox" checked={form.enableDigitalTicket} onChange={e => setForm(f => ({...f, enableDigitalTicket: e.target.checked}))} />
                    <span className="toggle-slider" />
                  </label>
                  Habilitar Senha Digital (Exibir link no Totem e Ticket)
                </label>
              </div>
              <div className="settings-field">
                <label className="settings-label">IP do Servidor</label>
                <div style={{display:'flex',gap:'0.5rem',alignItems:'center'}}>
                  <input className="settings-input" style={{flex:1}} value={form.serverIp} onChange={e => setForm(f => ({...f, serverIp: e.target.value}))} placeholder="Ex: 192.168.1.100 ou localhost" />
                  <button className="btn btn-secondary" style={{fontSize:'0.85rem',padding:'0.4rem 0.75rem',whiteSpace:'nowrap'}} onClick={async () => {
                    if (window.electronAPI?.saveStationConfig) {
                      await window.electronAPI.saveStationConfig({ serverIp: form.serverIp });
                      alert(`IP "${form.serverIp}" salvo!\n\nFeche e reabra o app para conectar ao novo servidor.`);
                    }
                  }}>💾 Salvar IP</button>
                </div>
                <span style={{fontFamily:'Rajdhani',fontSize:'0.85rem',color:'var(--text-muted)',marginTop:'0.25rem'}}>
                  IP do computador onde o servidor está rodando. Usado pelo Telão e outros clientes para sincronizar.
                </span>
              </div>
              <div className="settings-field">
                <label className="settings-label">Código de Desbloqueio do Funcionário (para trocar papel)</label>
                <input type="text" className="settings-input" value={form.staffUnlockCode} onChange={e => setForm(f => ({...f, staffUnlockCode: e.target.value}))} placeholder="Ex: 1234" />
                <span style={{fontFamily:'Rajdhani',fontSize:'0.85rem',color:'var(--text-muted)',marginTop:'0.25rem'}}>
                  Este código será solicitado quando o papel da impressora acabar
                </span>
              </div>
              <div style={{display:'flex',gap:'1rem'}}>
                <div className="settings-field" style={{flex:1}}>
                  <label className="settings-label">Horário de Abertura</label>
                  <input type="time" className="settings-input" value={form.workingHoursStart} onChange={e => setForm(f => ({...f, workingHoursStart: e.target.value}))} />
                </div>
                <div className="settings-field" style={{flex:1}}>
                  <label className="settings-label">Horário de Fechamento</label>
                  <input type="time" className="settings-input" value={form.workingHoursEnd} onChange={e => setForm(f => ({...f, workingHoursEnd: e.target.value}))} />
                </div>
              </div>
              <div className="settings-field">
                <label className="settings-label">Duração do Overlay de Chamada (segundos)</label>
                <input type="number" min="1" max="30" className="settings-input" value={form.overlayDuration} onChange={e => setForm(f => ({...f, overlayDuration: Number(e.target.value)}))} />
              </div>
              <div className="settings-field">
                <label className="settings-label">Som ao Chamar Senha</label>
                <select className="settings-input" value={form.callSoundMode} onChange={e => setForm(f => ({...f, callSoundMode: e.target.value}))}>
                  <option value="none">Nenhum</option>
                  <option value="bell">Campainha</option>
                  <option value="voice">Voz sintética</option>
                  <option value="both">Campainha + Voz</option>
                </select>
              </div>
              {form.callSoundMode !== 'none' && (
                <div className="settings-field">
                  <label className="settings-label">Volume do Som (0.0 a 1.0)</label>
                  <input type="number" min="0" max="1" step="0.1" className="settings-input" value={form.soundVolume} onChange={e => setForm(f => ({...f, soundVolume: Number(e.target.value)}))} />
                </div>
              )}
              <button className="btn btn-primary" style={{alignSelf:'flex-start'}} onClick={save}>Salvar Configurações</button>
            </div>
          </div>
          {window.electronAPI && window.electronAPI.isElectron && (
            <PrinterSection />
          )}
          {window.electronAPI && window.electronAPI.isElectron && (
            <LicenseSection />
          )}
          <div className="admin-section">
            <div className="reset-buttons">
              <button className="btn btn-warning" style={{background:'var(--warning)',color:'#fff'}} onClick={() => { if(window.confirm('Confirma reset diário? Filas e contadores serão zerados.')) dailyReset(); }}>🔄 Reset Diário</button>
              <FullResetButton />
              <button className="btn btn-secondary" onClick={exportHistory}>📥 Exportar Histórico JSON</button>
              {window.electronAPI && window.electronAPI.isElectron && (
                <button 
                  className="btn btn-info" 
                  onClick={async () => {
                    try {
                      const status = await window.electronAPI.checkPrinterWMI();
                      alert(`Status da Impressora (WMI):\n\n${status}\n\nVerifique o console (F12) para mais detalhes.`);
                      console.log('[Diagnóstico] Status WMI:', status);
                    } catch (error) {
                      alert(`Erro ao verificar impressora:\n\n${error.message}`);
                      console.error('[Diagnóstico] Erro WMI:', error);
                    }
                  }}
                >
                  🖨️ Testar Status Impressora (WMI)
                </button>
              )}
              {window.electronAPI && window.electronAPI.isElectron && window.electronAPI.diagnosePrinter && (
                <button 
                  className="btn btn-secondary" 
                  onClick={async () => {
                    try {
                      const result = await window.electronAPI.diagnosePrinter();
                      const msg = [
                        `=== paperStatus global: ${result.paperStatusGlobal} ===`,
                        '',
                        '--- Win32_Printer ---',
                        result.win32Printers,
                        result.win32PrintersStderr ? `STDERR: ${result.win32PrintersStderr}` : '',
                        '',
                        '--- Fila de Jobs (Get-PrintJob) ---',
                        result.printJobs,
                        result.printJobsStderr ? `STDERR: ${result.printJobsStderr}` : '',
                      ].filter(l => l !== undefined).join('\n');
                      alert(msg);
                      console.log('[Diagnóstico Fila]', result);
                    } catch (error) {
                      alert(`Erro no diagnóstico:\n\n${error.message}`);
                      console.error('[Diagnóstico Fila] Erro:', error);
                    }
                  }}
                >
                  🔍 Diagnóstico Completo (Fila + WMI)
                </button>
              )}
            </div>
          </div>
          <div className="admin-section">
            <div className="admin-section-title">Backup e Restauração</div>
            <div className="reset-buttons">
              <button className="btn btn-success" onClick={exportBackup}>💾 Fazer Backup Completo</button>
              <button className="btn btn-info" onClick={importBackup}>📂 Restaurar Backup</button>
            </div>
            <p style={{fontFamily:'Rajdhani',fontSize:'0.9rem',color:'var(--text-muted)',marginTop:'0.75rem'}}>
              O backup inclui: configurações, serviços, guichês, mídia indoor e histórico de chamadas.
            </p>
          </div>
        </div>
      );
    }

    // =========================================================
    // NavBar — barra de navegação fixa no topo
    // =========================================================
    const NAV_ITEMS = [
      { id: 'totem',    label: 'Totem' },
      { id: 'painel',   label: 'Painel' },
      { id: 'operador', label: 'Operador' },
      { id: 'admin',    label: 'Administrador' },
    ];

    function NavBar({ activeModule, setActiveModule }) {
      return (
        <nav className="navbar">
          <span className="navbar-logo">Painel do Ni</span>
          <div className="navbar-nav">
            {NAV_ITEMS.map(item => (
              <button
                key={item.id}
                className={`navbar-btn${activeModule === item.id ? ' active' : ''}`}
                onClick={() => setActiveModule(item.id)}
              >
                {item.label}
              </button>
            ))}
          </div>
        </nav>
      );
    }

    // =========================================================
    // Componente App — raiz da aplicação
    // =========================================================

    // Mapa de modo de estação para módulo fixo
    const STATION_MODULE_MAP = {
      totem:    'totem',
      painel:   'painel',
      operador: 'operador',
      admin:    'admin',
    };

    // =========================================================
    // ErrorBoundary — Captura erros do React
    // =========================================================
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true };
      }

      componentDidCatch(error, errorInfo) {
        console.error('ErrorBoundary capturou erro:', error, errorInfo);
        this.setState({ error, errorInfo });
      }

      render() {
        if (this.state.hasError) {
          return (
            <div style={{
              padding: '40px',
              textAlign: 'center',
              fontFamily: 'Arial, sans-serif',
              backgroundColor: '#fff3cd',
              border: '2px solid #ffc107',
              borderRadius: '8px',
              margin: '20px'
            }}>
              <h1 style={{ color: '#856404' }}>⚠️ Erro na Aplicação</h1>
              <p style={{ color: '#856404', marginBottom: '20px' }}>
                Ocorreu um erro inesperado. Por favor, recarregue a página.
              </p>
              <details style={{ 
                textAlign: 'left', 
                backgroundColor: '#fff', 
                padding: '15px', 
                borderRadius: '4px',
                maxWidth: '800px',
                margin: '0 auto'
              }}>
                <summary style={{ cursor: 'pointer', fontWeight: 'bold', marginBottom: '10px' }}>
                  Detalhes do erro (clique para expandir)
                </summary>
                <pre style={{ 
                  fontSize: '12px', 
                  overflow: 'auto',
                  backgroundColor: '#f8f9fa',
                  padding: '10px',
                  borderRadius: '4px'
                }}>
                  {this.state.error && this.state.error.toString()}
                  {this.state.errorInfo && this.state.errorInfo.componentStack}
                </pre>
              </details>
              <button 
                onClick={() => window.location.reload()}
                style={{
                  marginTop: '20px',
                  padding: '10px 20px',
                  fontSize: '16px',
                  backgroundColor: '#007bff',
                  color: 'white',
                  border: 'none',
                  borderRadius: '4px',
                  cursor: 'pointer'
                }}
              >
                Recarregar Página
              </button>
            </div>
          );
        }

        return this.props.children;
      }
    }

    function App() {
      const [, setState] = React.useState(0);
      const stationMode   = window.STATION_MODE;
      const fixedModule   = stationMode ? (STATION_MODULE_MAP[stationMode] || 'totem') : null;
      const [activeModule, setActiveModule] = React.useState(fixedModule || 'totem');

      React.useEffect(() => {
        // Registra dispatchUpdate — publica no Firebase ao atualizar
        window.dispatchUpdate = () => {
          setState(n => n + 1);
          window.fbPush(window.APP_STATE);
        };

        // Escuta mudanças remotas do Firebase
        window.fbListen(() => setState(n => n + 1));
      }, []);

      // Título da aba conforme modo
      React.useEffect(() => {
        const labels = { totem: 'Totem', painel: 'Painel', operador: 'Operador', admin: 'Administrador' };
        document.title = stationMode
          ? `Painel de senha do Ni — ${labels[stationMode] || stationMode}`
          : 'Painel de senha do Ni';
      }, []);

      // Fullscreen automático no módulo Painel (apenas no Electron)
      React.useEffect(() => {
        if (!window.electronAPI) return;
        
        const currentModule = fixedModule || activeModule;
        if (currentModule === 'painel') {
          window.electronAPI.setFullscreen(true);
        } else {
          window.electronAPI.setFullscreen(false);
        }
      }, [activeModule, fixedModule]);

      const renderModule = () => {
        const mod = fixedModule || activeModule;
        switch (mod) {
          case 'totem':    return <TotemModule />;
          case 'painel':   return <PainelModule />;
          case 'operador': return <OperadorModule />;
          case 'admin':    return <AdminModule />;
          default:         return <TotemModule />;
        }
      };

      // Modo estação: sem NavBar, tela cheia no módulo fixo
      if (fixedModule) {
        return (
          <div className="module-container" style={{ paddingTop: 0 }}>
            {renderModule()}
          </div>
        );
      }

      // Modo completo: com NavBar e todos os módulos
      return (
        <div>
          <NavBar activeModule={activeModule} setActiveModule={setActiveModule} />
          <div className="module-container">
            {renderModule()}
          </div>
        </div>
      );
    }

    // =========================================================
    // Sistema de Licença — Gatekeeper + Tela de Ativação
    // =========================================================

    // Formata data para exibição
    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    // Badge de licença exibido no Admin
    function LicenseBadge({ license }) {
      if (!license) return null;
      const days = license.expiration_date
        ? Math.ceil((new Date(license.expiration_date) - new Date()) / 86400000)
        : null;
      const isDemo = license.license_type === 'Demonstrativa';
      const isWarning = days !== null && days <= 7;
      const color = isDemo ? '#f59e0b' : isWarning ? '#ef4444' : '#22c55e';
      const label = isDemo
        ? `🔑 Demo — válida até ${fmtDate(license.expiration_date)}`
        : isWarning
          ? `⚠️ Licença vence em ${days} dia${days !== 1 ? 's' : ''}`
          : `✓ Licença ${license.license_type || 'Ativa'} — válida até ${fmtDate(license.expiration_date)}`;
      return (
        <div style={{
          position: 'fixed', bottom: 8, right: 12, zIndex: 9000,
          background: `${color}22`, border: `1px solid ${color}`,
          borderRadius: 6, padding: '3px 10px',
          fontFamily: 'Rajdhani, sans-serif', fontSize: '0.78rem',
          fontWeight: 600, color, pointerEvents: 'none',
        }}>
          {label}
        </div>
      );
    }

    // Tela de Ativação
    function ActivationScreen({ onActivated }) {
      const [code, setCode] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState('');
      const [checking, setChecking] = React.useState(true);

      // Verifica serial salvo ao montar
      React.useEffect(() => {
        async function checkSaved() {
          if (!window.electronAPI?.licenseGetSaved) { setChecking(false); return; }
          const saved = await window.electronAPI.licenseGetSaved();
          if (saved?.code) {
            const result = await window.electronAPI.licenseValidate(saved.code);
            if (result.isValid) { onActivated(result.license); return; }
            setError(result.error || 'Licença inválida. Por favor, reative.');
          }
          setChecking(false);
        }
        checkSaved();
      }, []);

      const handleActivate = async () => {
        if (!code.trim()) { setError('Por favor, insira o código de licença.'); return; }
        setLoading(true); setError('');
        try {
          const result = await window.electronAPI.licenseValidate(code.trim().toUpperCase());
          if (result.isValid) {
            onActivated(result.license);
          } else {
            setError(result.error || 'Licença inválida.');
          }
        } catch (e) {
          setError('Erro ao verificar licença. Verifique sua conexão.');
        }
        setLoading(false);
      };

      // Input — 6 caracteres alfanuméricos, sem formatação automática
      const handleInput = (e) => {
        const v = e.target.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
        setCode(v.substring(0, 6));
      };

      if (checking) {
        return (
          <div style={{ position:'fixed', inset:0, background:'#0f172a', display:'flex', alignItems:'center', justifyContent:'center', zIndex:99999 }}>
            <div style={{ color:'#94a3b8', fontFamily:'Rajdhani, sans-serif', fontSize:'1.2rem' }}>Verificando licença...</div>
          </div>
        );
      }

      return (
        <div style={{
          position:'fixed', inset:0, background:'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)',
          display:'flex', alignItems:'center', justifyContent:'center', zIndex:99999,
          fontFamily:'Rajdhani, sans-serif',
        }}>
          <div style={{
            background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)',
            borderRadius:16, padding:'2.5rem 2rem', width:'100%', maxWidth:420,
            boxShadow:'0 25px 60px rgba(0,0,0,0.5)', textAlign:'center',
          }}>
            {/* Ícone */}
            <div style={{ fontSize:'3.5rem', marginBottom:'0.75rem' }}>🔐</div>

            {/* Título */}
            <div style={{ fontFamily:'Oswald, sans-serif', fontSize:'1.8rem', fontWeight:700, color:'#f8fafc', letterSpacing:'0.05em', marginBottom:'0.4rem' }}>
              Painel de senha do Ni
            </div>
            <div style={{ color:'#94a3b8', fontSize:'1rem', marginBottom:'2rem', lineHeight:1.5 }}>
              Insira seu código de licença para ativar o software.
            </div>

            {/* Input */}
            <input
              type="text"
              value={code}
              onChange={handleInput}
              onKeyDown={e => e.key === 'Enter' && handleActivate()}
              placeholder="Ex: JXPWP1"
              maxLength={6}
              style={{
                width:'100%', padding:'0.85rem 1rem', marginBottom:'0.75rem',
                background:'rgba(255,255,255,0.08)', border:`1px solid ${error ? '#ef4444' : 'rgba(255,255,255,0.15)'}`,
                borderRadius:10, color:'#f8fafc', fontFamily:'Courier New, monospace',
                fontSize:'1.2rem', textAlign:'center', letterSpacing:'0.15em', outline:'none',
              }}
              autoFocus
            />

            {/* Erro */}
            {error && (
              <div style={{ color:'#fca5a5', fontSize:'0.9rem', marginBottom:'0.75rem', background:'rgba(239,68,68,0.1)', borderRadius:8, padding:'0.5rem 0.75rem' }}>
                ⚠️ {error}
              </div>
            )}

            {/* Botão */}
            <button
              onClick={handleActivate}
              disabled={loading || !code.trim()}
              style={{
                width:'100%', padding:'0.9rem', borderRadius:10, border:'none',
                background: loading || !code.trim() ? '#334155' : 'linear-gradient(135deg, #2563eb, #1d4ed8)',
                color:'#fff', fontFamily:'Rajdhani, sans-serif', fontSize:'1.1rem',
                fontWeight:700, cursor: loading || !code.trim() ? 'not-allowed' : 'pointer',
                letterSpacing:'0.05em', transition:'all 0.2s',
              }}
            >
              {loading ? '⏳ Verificando...' : '🔑 Ativar Licença'}
            </button>

            {/* Suporte */}
            <div style={{ marginTop:'1.5rem', color:'#64748b', fontSize:'0.85rem', lineHeight:1.6 }}>
              Não tem uma licença?{' '}
              <span
                style={{ color:'#3b82f6', cursor:'pointer', textDecoration:'underline' }}
                onClick={() => { if (window.electronAPI) window.electronAPI.setFullscreen && window.electronAPI.setFullscreen(false); }}
              >
                Solicitar licença Demo
              </span>
              <br/>
              Suporte: contato@paineldesenhadoni.com.br
            </div>
          </div>
        </div>
      );
    }

    // Gatekeeper — envolve o App e bloqueia se não houver licença válida
    function LicenseGate({ children }) {
      const [licenseState, setLicenseState] = React.useState('checking'); // 'checking' | 'valid' | 'invalid'
      const [license, setLicense] = React.useState(null);

      const handleActivated = (lic) => {
        setLicense(lic);
        setLicenseState('valid');
      };

      // Revalidação periódica a cada 1h
      React.useEffect(() => {
        if (licenseState !== 'valid' || !license) return;
        const interval = setInterval(async () => {
          if (!window.electronAPI?.licenseGetSaved) return;
          const saved = await window.electronAPI.licenseGetSaved();
          if (!saved?.code) { setLicenseState('invalid'); return; }
          const result = await window.electronAPI.licenseValidate(saved.code);
          if (!result.isValid) setLicenseState('invalid');
        }, 60 * 60 * 1000); // 1 hora
        return () => clearInterval(interval);
      }, [licenseState, license]);

      if (licenseState === 'checking' || licenseState === 'invalid') {
        return <ActivationScreen onActivated={handleActivated} />;
      }

      return (
        <>
          {children}
          <LicenseBadge license={license} />
        </>
      );
    }

    // =========================================================
    // Ponto de entrada — monta a aplicação
    // =========================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));

    // Se não está no Electron, pula o gatekeeper (modo web/browser)
    const isElectronEnv = !!(window.electronAPI && window.electronAPI.isElectron);

    root.render(
      <ErrorBoundary>
        {isElectronEnv ? (
          <LicenseGate>
            <App />
          </LicenseGate>
        ) : (
          <App />
        )}
      </ErrorBoundary>
    );
  </script>
</body>
</html>
